<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <title>小娜宝贝</title>
    <link href="styles/highlight.css" rel="stylesheet" />
    <link href="styles/chat.css" rel="stylesheet" />
</head>
<body>
    <!-- 标题栏 -->
    <div class="titlebar">
        <div class="history-selector" id="historySelector">
            <button class="history-btn" id="historyBtn">
                <span class="history-label" id="historyLabel">新对话</span>
                <span class="history-arrow">▼</span>
            </button>
            <div class="history-panel" id="historyPanel"></div>
        </div>
        <div class="titlebar-actions">
            <button class="titlebar-action-btn" id="btnNewSession" title="新建会话">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
            </button>
            <button class="titlebar-action-btn" id="btnClearMessages" title="清空页面消息">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6" />
                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                    <path d="M10 11v6" />
                    <path d="M14 11v6" />
                </svg>
            </button>
            <button class="titlebar-action-btn" id="btnSettings" title="设置">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3" />
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                </svg>
            </button>
        </div>
    </div>

    <!-- 主容器 -->
    <div class="app-container">
        <!-- 聊天消息区域 -->
        <div class="chat-messages" id="chatMessages">
            <div class="welcome">
                <div class="logo">🤖</div>
                <h2>你好，有什么可以帮你的？</h2>
                <p>输入消息开始对话，按 # 调出快捷指令</p>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-area" style="position:relative;">
            <!-- # 命令面板 -->
            <div class="command-panel" id="commandPanel"></div>

            <!-- 附件预览 -->
            <div class="attachments" id="attachments"></div>

            <!-- 输入框行 -->
            <div class="input-wrapper">
                <!-- 文本输入 -->
                <textarea id="chatInput" rows="1" placeholder="输入消息 (# 连接文件)... (Shift+Enter 换行)"></textarea>
                <!-- 发送/停止按钮 -->
                <button class="btn-icon btn-send" id="btnSend" title="发送">
                    <svg class="send-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                    </svg>
                    <div class="spinner"></div>
                </button>
            </div>

            <!-- 文件选择（隐藏） -->
            <input type="file" class="file-input" id="fileInput" multiple />

            <!-- 工具栏 -->
            <div class="toolbar">
                <!-- 添加附件 -->
                <button class="selector-btn" id="btnAttach" title="添加附件">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    <span class="label">附件</span>
                </button>

                <!-- 智能体选择 -->
                <div class="selector">
                    <button class="selector-btn" id="agentBtn">
                        <span>🧠</span>
                        <span class="label">智能体</span>
                        <span class="arrow">▲</span>
                    </button>
                    <div class="selector-panel" id="agentPanel"></div>
                </div>

                <!-- 厂商选择 -->
                <div class="selector">
                    <button class="selector-btn" id="providerBtn">
                        <span>🏢</span>
                        <span class="label">厂商</span>
                        <span class="arrow">▲</span>
                    </button>
                    <div class="selector-panel" id="providerPanel"></div>
                </div>

                <!-- 模型选择 -->
                <div class="selector">
                    <button class="selector-btn" id="modelBtn">
                        <span>🔮</span>
                        <span class="label">模型</span>
                        <span class="arrow">▲</span>
                    </button>
                    <div class="selector-panel" id="modelPanel"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 脚本（按依赖顺序加载） -->
    <!-- 库 -->
    <script src="js/highlight.min.js"></script>
    <script src="js/marked.min.js"></script>

    <!-- 基础设施（所有模块依赖） -->
    <script src="js/state.js"></script>
    <script src="js/dom-refs.js"></script>

    <!-- 功能模块 -->
    <script src="js/message-handler.js"></script>
    <script src="js/websocket.js"></script>
    <script src="js/selectors.js"></script>
    <script src="js/history.js"></script>
    <script src="js/attachments.js"></script>
    <script src="js/data-loader.js"></script>
    <script src="js/commands.js"></script>
    <script src="js/input-handler.js"></script>

    <!-- 主入口（初始化所有模块） -->
    <script src="js/chat.js"></script>
    <script>
        // 当页面从最小化/切到后台再恢复到前台时，尝试重新加载会话与当前消息列表
        function tryReloadMessages() {
            try {
                // 重新加载会话列表（会自动加载最新会话的消息）
                if (typeof loadSessions === 'function') {
                    loadSessions();
                }

                // 如果已选中会话，则显式重新加载该会话的消息以保证视图刷新
                if (typeof state !== 'undefined' && state.currentSessionId && typeof loadSessionMessages === 'function') {
                    loadSessionMessages(state.currentSessionId);
                }

                //// 如有需要，可在此处重新连接 WebSocket
                //if (typeof connectWebSocket === 'function') {
                //    try {
                //        connectWebSocket();
                //    } catch (e) {
                //        // connectWebSocket 可能会抛出若已连接，忽略
                //    }
                //}
            } catch (e) {
                console.error('恢复前台时刷新消息失败', e);
            }
        }

        //// 支持 visibilitychange（大多数情况下有效）和 window focus（在某些宿主中更可靠）
        //document.addEventListener('visibilitychange', () => {
        //    if (document.visibilityState === 'visible') {
        //        console.log('小娜：主人回来啦！(页面已恢复)');
        //        tryReloadMessages();
        //    } else if (document.visibilityState === 'hidden') {
        //        console.log('小娜：主人暂时离开啦~(页面已隐藏)');
        //    }
        //});

        //// 某些 WebView/宿主在最小化/恢复时不触发 visibilitychange，但会触发 focus
        //window.addEventListener('focus', () => {
        //    console.log('小娜：窗口获得焦点，检查并刷新消息');
        //    tryReloadMessages();
        //});
    </script>
</body>
</html>
