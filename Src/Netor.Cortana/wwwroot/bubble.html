<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <title>语音气泡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent;
            user-select: none;
            cursor: default;
            display: flex;
            align-items: stretch;
            justify-content: center;
        }

        .bubble {
            width: 100%;
            min-height: 48px;
            border-radius: 16px;
            background: rgba(30, 30, 34, 0.92);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(100, 100, 255, 0.15);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            position: relative;
            overflow: visible;
            transition: all 0.3s ease;
        }

            /* 底部小三角指向 FloatWindow */
            /*.bubble::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 12px;
            background: rgba(30, 30, 34, 0.92);
            border-radius: 2px;
            rotate: 45deg;
            box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }*/

            /* 顶部装饰光晕线 */
            .bubble::before {
                content: '';
                position: absolute;
                top: 0;
                left: 20px;
                right: 20px;
                height: 1px;
                background: linear-gradient(90deg, transparent, rgba(100, 180, 255, 0.4), rgba(150, 120, 255, 0.4), transparent);
            }

        .content {
            font-family: 'Microsoft YaHei UI', 'Segoe UI', sans-serif;
            font-size: 14px;
            line-height: 1.6;
            text-align: center;
            color: #ffffff;
            word-break: break-all;
            transition: color 0.3s ease;
            overflow-y: scroll;
            overflow-x: hidden;
            width: 100%;
            padding: 12px;
            padding-left: 10px;
            max-height: 300px;
        }

            /* 自定义滚动条 - 与暗色主题一致 */
            .content::-webkit-scrollbar {
                width: 4px;
            }

            .content::-webkit-scrollbar-track {
                background: transparent;
            }

            .content::-webkit-scrollbar-thumb {
                background: rgba(100, 100, 255, 0.3);
                border-radius: 2px;
            }

                .content::-webkit-scrollbar-thumb:hover {
                    background: rgba(100, 180, 255, 0.5);
                }

        /* 监听状态 - 呼吸脉冲指示器 */
        .listening-indicator {
            display: none;
            width: 8px;
            height: 8px;
            margin-top: 5px;
            border-radius: 50%;
            background: #64b4ff;
            margin-right: 10px;
            flex-shrink: 0;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .bubble.listening .listening-indicator {
            display: block;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.4;
                transform: scale(0.8);
                box-shadow: 0 0 0 0 rgba(100, 180, 255, 0.4);
            }

            50% {
                opacity: 1;
                transform: scale(1);
                box-shadow: 0 0 8px 2px rgba(100, 180, 255, 0.3);
            }
        }

        /* 状态特定颜色 */
        .bubble.listening .content {
            color: #ffffff;
        }

        .bubble.partial .content {
            color: #b0b0b0;
        }

        .bubble.final .content {
            color: #64c8ff;
        }

        .bubble.dismissed .content {
            color: #808080;
        }

        /* 淡入淡出 */
        .bubble.fade-in {
            animation: fadeIn 0.25s ease-out;
        }

        .bubble.fade-out {
            animation: fadeOut 0.3s ease-in forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }

            to {
                opacity: 0;
                transform: translateY(4px);
            }
        }
    </style>
</head>
<body>
    <div class="bubble listening fade-in" id="bubble">
        <div class="listening-indicator" id="indicator"></div>
        <div class="content" id="content">主人，我在 ...</div>
    </div>

    <script>
        /**
         * bubble.js - 语音气泡窗口交互逻辑
         * 由 C# 通过 ExecuteScriptAsync 调用
         *
         * 高度计算设计：
         * - 窗口高度 = body.padding上(10) + bubble实际高度 + body.padding下(10)
         * - bubble高度 = padding上(12) + content文本高度 + padding下(12)
         * - 文本少于最大行数时，窗口动态增长
         * - 达到最大窗口高度后，content 启用滚动条
         */
        const bubble = document.getElementById('bubble');
        const content = document.getElementById('content');

        /** body padding 上下各 10px */
        const BODY_PADDING = 20;
        /** bubble padding 上下各 12px */
        const BUBBLE_PADDING = 24;
        /** 窗口最小高度 */
        const MIN_HEIGHT = 80;
        /** 窗口最大高度（超出后启用内容滚动） */
        const MAX_HEIGHT = 360;

        /**
         * 将内容区域平滑滚动到底部
         */
        function scrollToBottom() {
            content.scrollTop = content.scrollHeight;
        }

        /**
         * 根据当前内容高度决定是否启用滚动
         * - 未达最大高度：移除 max-height，内容自然撑开
         * - 已达最大高度：设置 max-height 并启用 overflow-y: auto
         */
        function updateScrollMode() {
            var contentNaturalHeight = content.scrollHeight;
            var maxContentHeight = MAX_HEIGHT - BODY_PADDING - BUBBLE_PADDING;

            if (contentNaturalHeight > maxContentHeight) {
                content.style.maxHeight = maxContentHeight + 'px';
                content.style.overflowY = 'auto';
            } else {
                content.style.maxHeight = '';
                content.style.overflowY = 'hidden';
            }
        }

        /**
         * 设置为监听状态
         */
        function setListening() {
            bubble.className = 'bubble listening fade-in';
            content.textContent = '主人，我在 ...';
            content.style.maxHeight = '';
            content.style.overflowY = 'hidden';
        }

        /**
         * 更新中间识别文本
         */
        function setPartialResult(text) {
            bubble.className = 'bubble partial';
            content.textContent = text;
            updateScrollMode();
            scrollToBottom();
        }

        /**
         * 显示最终识别结果
         */
        function setFinalResult(text) {
            bubble.className = 'bubble final';
            content.textContent = text;
            updateScrollMode();
            scrollToBottom();
        }

        /**
         * 显示无内容提示
         */
        function setDismissed() {
            bubble.className = 'bubble dismissed';
            content.textContent = '没有听到内容';
            content.style.maxHeight = '';
            content.style.overflowY = 'hidden';
        }

        /**
         * 播放淡出动画（C# 在动画结束后隐藏窗口）
         */
        function fadeOut() {
            bubble.classList.add('fade-out');
        }

        /**
         * 获取气泡内容实际需要的窗口高度（供 C# 动态调整窗口大小）
         * 计算公式：body.padding(20) + bubble.padding(24) + content实际文本高度
         * 最小值 MIN_HEIGHT，最大值 MAX_HEIGHT
         */
        function getDesiredHeight() {
            var contentHeight = content.scrollHeight;
            var totalHeight = BODY_PADDING + BUBBLE_PADDING + contentHeight;
            return Math.max(Math.min(totalHeight, MAX_HEIGHT), MIN_HEIGHT);
        }
    </script>
</body>
</html>
